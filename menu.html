<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaffleLab - Menu</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
            width: 100%;
            max-width: 1000px;
        }
        .menu-item {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
            border: 2px solid #d2691e;
        }
        .menu-item h3 { color: #8b4513; margin-bottom: 10px; }
        .price { font-weight: bold; color: #d2691e; font-size: 1.2em; }
        .nav-links { margin-top: 20px; }
    </style>
</head>
<body>
    <div class="waffle-container">
        <header>
            <img src="logo.png" alt="Waffle Lab Logo" class="waffle-icon">
            <h1>Our Waffle Menu</h1>
        </header>

        <div class="menu-grid">
            <div class="menu-item">
                <h3>Standard Waffles</h3>
                <p>1/4 Waffle - <span class="price">£2.00</span></p>
                <p>Single Waffle - <span class="price">£4.50</span></p>
                <p>2 Waffles - <span class="price">£8.00</span></p>
            </div>

            <div class="menu-item">
                <h3>Signature Sauces</h3>
                <p>Chocolate Sauce</p>
                <p>Pistachio Sauce</p>
                <p>White Chocolate</p>
            </div>

            <div class="menu-item">
                <h3>Top Picks</h3>
                <p>Oreo Crumble</p>
                <p>Marshmallows</p>
                <p>Kinder Chunks</p>
                <p>Biscoff Spread</p>
            </div>
        </div>

        <div class="nav-links">
            <a href="index.html"><button class="btn">Go to Order Page →</button></a>
        </div>

        <footer>
            <p>📍 Collection Only in Luton | 💵 Cash Only</p>
        </footer>
    </div>
</body>
</html>
