<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaffleLab Menu</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #d2691e, #ffdead);
            color: #3e2723;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #8b4513;
            padding: 10px;
            text-align: center;
        }
        nav {
            margin: 10px 0;
        }
        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
        }
        h1, h2 {
            margin: 0;
        }
        .menu-section {
            margin: 20px;
        }
        .menu-item {
            background-color: rgba(255, 255, 255, 0.8);
            margin: 10px 0;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }
        .price {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to WaffleLab!</h1>
        <nav>
            <a href="#sauces">Sauces</a>
            <a href="#toppings">Toppings</a>
            <a href="#extras">Extras</a>
            <a href="#contact">Contact Us</a>
        </nav>
    </header>
    <div class="menu-section" id="sauces">
        <h2>Sauces</h2>
        <div class="menu-item">
            <span>Chocolate Sauce</span> - <span class="price">£4.50</span>
        </div>
        <div class="menu-item">
            <span>Pistachio Sauce</span> - <span class="price">£4.50</span>
        </div>
        <div class="menu-item">
            <span>White Chocolate</span> - <span class="price">£4.50</span>
        </div>
    </div>
    <div class="menu-section" id="toppings">
        <h2>Toppings</h2>
        <div class="menu-item">
            <span>Oreo</span> - <span class="price">£4.50</span>
        </div>
        <div class="menu-item">
            <span>Marshmallow</span> - <span class="price">£4.50</span>
        </div>
        <div class="menu-item">
            <span>Kinder</span> - <span class="price">£4.50</span>
        </div>
        <div class="menu-item">
            <span>Biscoff</span> - <span class="price">£4.50</span>
        </div>
    </div>
    <div class="menu-section" id="extras">
        <h2>Extras</h2>
        <div class="menu-item">
            <span>Vanilla Ice Cream</span> - <span class="price">£4.50</span>
        </div>
        <div class="menu-item">
            <span>Extra Topping</span> - <span class="price">£4.50</span>
        </div>
    </div>
    <footer>
        <p style="text-align:center;">&copy; 2026 WaffleLab</p>
    </footer>
</body>
</html>
