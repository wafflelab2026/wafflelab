<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Contact - Waffle Lab Luton</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .contact-card {
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        .contact-info {
            text-align: left;
            background: var(--cream);
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            border-left: 8px solid var(--chocolate-orange);
        }
        .contact-info p {
            margin: 10px 0;
            font-size: 1.1em;
        }
        h1 { color: var(--chocolate-brown); }
    </style>
</head>
<body>

    <nav class="main-nav">
        <a href="index.html">Order</a>
        <a href="menu.html">Menu</a>
        <a href="contact.html" style="border-bottom: 2px solid #ffeba1;">Contact</a>
    </nav>

    <div class="waffle-container">
        <img src="logo.png" alt="Waffle Lab Logo" class="waffle-icon">
        
        <div class="contact-card">
            <h1>Contact the Lab</h1>
            <p>Questions? Experiments? Get in touch!</p>
            
            <div class="contact-info">
                <p><strong>📱 WhatsApp:</strong> 07364 135785</p>
                <p><strong>📸 Instagram:</strong> @WaffleLabLuton</p>
                <p><strong>📍 Location:</strong> Luton, UK</p>
            </div>

            <button class="btn" onclick="location.href='index.html'">Back to Ordering</button>
        </div>
    </div>

</body>
</html>
