<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaffleLab - Contact Us</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .contact-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
            border: 2px solid #d2691e;
        }
        .contact-info { margin: 20px 0; line-height: 1.8; }
        .social-links { 
            margin-top: 20px; 
            padding: 15px;
            background: #fff8dc;
            border-radius: 10px;
        }
        .social-item { 
            display: block; 
            margin: 10px 0; 
            color: #8b4513; 
            text-decoration: none; 
            font-weight: bold;
        }
        .social-item:hover { color: #d2691e; }
    </style>
</head>
<body>
    <div class="waffle-container">
        <header>
            <img src="logo.png" alt="Waffle Lab Logo" class="waffle-icon">
            <h1>Contact WaffleLab</h1>
        </header>

        <div class="contact-card">
            <h2>Get in Touch</h2>
            <div class="contact-info">
                <p><strong>📍 Location:</strong> Luton (Collection Only)</p>
                <p><strong>📱 WhatsApp:</strong> 07364135785</p>
            </div>

            <div class="social-links">
                <h3>Follow the Lab 🧪</h3>
                <a href="https://www.tiktok.com/@wafflelab25" class="social-item" target="_blank">🎵 TikTok: @wafflelab25</a>
                <a href="https://www.instagram.com/WaffleLab" class="social-item" target="_blank">📸 Instagram: WaffleLab</a>
                <a href="https://www.facebook.com/WaffleLab" class="social-item" target="_blank">👤 Facebook: WaffleLab</a>
            </div>

            <div class="navigation" style="margin-top: 20px; display: flex; flex-direction: column; gap: 10px;">
                <a href="index.html" style="text-decoration: none;">
                    <button class="btn" style="width: 100%;">Back to Ordering</button>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
