<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaffleLab - Order Now</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* These extra styles help the interactive steps work smoothly */
        .step { display: none; width: 100%; max-width: 500px; }
        .step.active { display: block; }
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            margin-top: 20px;
        }
        .button-group { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            margin: 20px 0; 
        }
        .option-btn { 
            padding: 15px; 
            background: #FFF8DC; 
            border: 2px solid #D2691E; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            color: #8B4513; 
        }
        .option-btn.selected { 
            background: #D2691E; 
            color: white; 
        }
        .summary-box { 
            background: #FFF8DC; 
            padding: 15px; 
            border-radius: 8px; 
            margin-bottom: 20px; 
            text-align: left;
        }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border: 1px solid #D2691E; 
            border-radius: 5px; 
        }
    </style>
</head>
<body>

    <div class="waffle-container">
        
        <header style="text-align: center;">
            <img src="logo.png" alt="Waffle Lab Logo" class="waffle-icon">
            <h1>Waffle Lab</h1>
        </header>

        <div class="container">
            <div class="step active" id="step1">
                <h2>Luton's Best Waffles</h2>
                <p>Ready to build your masterpiece?</p>
                <button class="btn" onclick="nextStep(2)" style="margin-top: 20px;">Start My Order →</button>
            </div>

            <div class="step" id="step2">
                <h3>1. Choose Your Size</h3>
                <div class="button-group">
                    <button class="option-btn" onclick="selectSize('1/4 Waffle', 2.00, this)">1/4 Waffle (£2)</button>
                    <button class="option-btn" onclick="selectSize('Single', 4.50, this)">Single (£4.50)</button>
                    <button class="option-btn" onclick="selectSize('2 Waffles', 8.00, this)">2 Waffles (£8)</button>
                    <button class="option-btn" onclick="selectSize('5 Waffles', 17.50, this)">5 Waffles (£17.50)</button>
                </div>
                <button class="btn" id="nextBtn2" disabled onclick="nextStep(3)">Next</button>
            </div>

            <div class="step" id="step3">
                <h3>2. Pick a Sauce</h3>
                <div class="button-group">
                    <button class="option-btn" onclick="selectSauce('Chocolate', this)">Chocolate</button>
                    <button class="option-btn" onclick="selectSauce('White Choc', this)">White Choc</button>
                    <button class="option-btn" onclick="selectSauce('Pistachio', this)">Pistachio</button>
                    <button class="option-btn" onclick="selectSauce('None', this)">No Sauce</button>
                </div>
                <button class="btn" onclick="nextStep(4)">Next</button>
            </div>

            <div class="step" id="step4">
                <h3>3. Pick a Topping</h3>
                <div class="button-group">
                    <button class="option-btn" onclick="selectTopping('Oreo', this)">Oreo</button>
                    <button class="option-btn" onclick="selectTopping('Kinder', this)">Kinder</button>
                    <button class="option-btn" onclick="selectTopping('Biscoff', this)">Biscoff</button>
                    <button class="option-btn" onclick="selectTopping('Marshmallows', this)">Marshmallows</button>
                </div>
                <button class="btn" onclick="nextStep(5)">View Summary</button>
            </div>

            <div class="step" id="step5">
                <h3>Final Step</h3>
                <div class="summary-box" id="orderSummary">
                    </div>
                <input type="text" id="custName" placeholder="Your Name" required>
                <button class="btn" onclick="sendToWhatsApp()" style="width: 100%;">Order via WhatsApp 📱</button>
            </div>
        </div>

        <footer style="margin-top: 30px; font-size: 0.8em; color: #8B4513;">
            📍 Luton | 💵 Cash Only | 🧪 Waffle Lab
        </footer>
    </div>

    <script>
        let order = { size: '', price: 0, sauce: '', topping: '' };

        function nextStep(s) {
            document.querySelectorAll('.step').forEach(step => step.classList.remove('active'));
            document.getElementById('step' + s).classList.add('active');
            if(s === 5) showSummary();
        }

        function selectSize(name, price, btn) {
            order.size = name; order.price = price;
            highlight(btn, '#step2');
            document.getElementById('nextBtn2').disabled = false;
        }

        function selectSauce(name, btn) { order.sauce = name; highlight(btn, '#step3'); }
        function selectTopping(name, btn) { order.topping = name; highlight(btn, '#step4'); }

        function highlight(btn, stepId) {
            document.querySelectorAll(stepId + ' .option-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        function showSummary() {
            document.getElementById('orderSummary').innerHTML = `
                <p><strong>Size:</strong> ${order.size}</p>
                <p><strong>Sauce:</strong> ${order.sauce}</p>
                <p><strong>Topping:</strong> ${order.topping}</p>
                <hr>
                <p><strong>Total: £${order.price.toFixed(2)}</strong></p>
            `;
        }

        function sendToWhatsApp() {
            const name = document.getElementById('custName').value;
            if(!name) return alert("Please enter your name!");
            
            const message = `NEW ORDER: %0AName: ${name}%0ASize: ${order.size}%0ASauce: ${order.sauce}%0ATopping: ${order.topping}%0ATotal: £${order.price.toFixed(2)}`;
            window.open(`https://wa.me/447364135785?text=${message}`, '_blank');
        }
    </script>
</body>
</html>
