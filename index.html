<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaffleLab</title>
</head>
<body>
    <header>
        <h1>Welcome to WaffleLab!</h1>
    </header>
    <nav>
        <ul>
            <li><a href="#ordering">Ordering</a></li>
            <li><a href="#sauces">Sauce Selection</a></li>
            <li><a href="#toppings">Toppings Selection</a></li>
            <li><a href="#extras">Extras</a></li>
            <li><a href="#total">Total</a></li>
        </ul>
    </nav>
    <section id="ordering">
        <h2>Ordering Page</h2>
        <form id="order-form">
            <label for="waffle-type">Choose your waffle type:</label>
            <select id="waffle-type" name="waffle-type">
                <option value="classic">Classic</option>
                <option value="chocolate">Chocolate</option>
                <option value="vanilla">Vanilla</option>
            </select>
            <button type="submit">Order Now</button>
        </form>
    </section>
    <section id="sauces">
        <h2>Sauce Selection</h2>
        <input type="checkbox" id="sauce-maple" name="sauce" value="maple">
        <label for="sauce-maple">Maple Syrup</label><br>
        <input type="checkbox" id="sauce-chocolate" name="sauce" value="chocolate">
        <label for="sauce-chocolate">Chocolate Sauce</label><br>
        <input type="checkbox" id="sauce-strawberry" name="sauce" value="strawberry">
        <label for="sauce-strawberry">Strawberry Sauce</label><br>
    </section>
    <section id="toppings">
        <h2>Toppings Selection</h2>
        <input type="checkbox" id="topping-nuts" name="topping" value="nuts">
        <label for="topping-nuts">Nuts</label><br>
        <input type="checkbox" id="topping-fruits" name="topping" value="fruits">
        <label for="topping-fruits">Fresh Fruits</label><br>
        <input type="checkbox" id="topping-cream" name="topping" value="cream">
        <label for="topping-cream">Whipped Cream</label><br>
    </section>
    <section id="extras">
        <h2>Extras</h2>
        <input type="checkbox" id="extra-icecream" name="extra" value="icecream">
        <label for="extra-icecream">Ice Cream</label><br>
        <input type="checkbox" id="extra-syrup" name="extra" value="extra_syrup">
        <label for="extra-syrup">Extra Syrup</label><br>
    </section>
    <section id="total">
        <h2>Total Calculation</h2>
        <button id="calculate-total">Calculate Total</button>
        <div id="total-amount"></div>
    </section>
    <footer>
        <p>&copy; 2026 WaffleLab</p>
    </footer>
    <script>
        document.getElementById('order-form').addEventListener('submit', function(event) {
            event.preventDefault();
            // Logic to process the order and calculate total
        });

        document.getElementById('calculate-total').addEventListener('click', function() {
            // Logic to calculate the total based on selections
            let total = 10; // Placeholder for total calculation
            document.getElementById('total-amount').innerText = 'Total: $' + total;
        });
    </script>
</body>
</html>
