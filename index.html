<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaffleLab Luton - Order</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Interactive Step Styles */
        .step { display: none; width: 100%; max-width: 450px; margin: 0 auto; }
        .step.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .order-card { 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            text-align: center;
            margin-top: 20px;
        }
        .option-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            margin: 20px 0; 
        }
        .choice-btn { 
            padding: 15px; 
            background: #FFF8DC; 
            border: 2px solid #D2691E; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold; 
            color: #8B4513; 
            transition: 0.2s;
        }
        .choice-btn.selected { background: #D2691E; color: white; }
        .summary-box { background: #fdf5e6; padding: 15px; border-radius: 10px; text-align: left; margin-bottom: 20px; border-left: 5px solid #D2691E; }
        input[type="text"] { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #D2691E; border-radius: 8px; box-sizing: border-box; }
        
        /* Navigation Styles */
        .main-nav { background: #8b4513; padding: 15px 0; text-align: center; width: 100%; position: sticky; top: 0; z-index: 1000; }
        .main-nav a { color: white; text-decoration: none; margin: 0 15px; font-weight: bold; font-size: 1.1em; }
        .main-nav a:hover { color: #ffeba1; }
    </style>
</head>
<body>

    <nav class="main-nav">
        <a href="index.html" style="border-bottom: 2px solid #ffeba1;">Order</a>
        <a href="menu.html">Menu</a>
        <a href="contact.html">Contact</a>
    </nav>

    <div class="waffle-container">
        
        <header>
            <img src="logo.png" alt="Waffle Lab Logo" class="waffle-icon">
            <h1 style="color: #8B4513; margin: 10px 0;">Waffle Lab</h1>
        </header>

        <div class="order-card">
            <div class="step active" id="step1">
                <h2 style="color: #D2691E;">Luton's Fresh Waffles</h2>
                <p>Build your custom order and collect in person!</p>
                <button class="btn" onclick="nextStep(2)" style="margin-top: 20px; width: 100%;">Start My Order →</button>
            </div>

            <div class="step" id="step2">
                <h3>1. Choose Size</h3>
                <div class="option-grid">
                    <button class="choice-btn" onclick="selectSize('1/4 Waffle', 2.00, this)">1/4 (£2)</button>
                    <button class="choice-btn" onclick="selectSize('Single', 4.50, this)">Single (£4.50)</button>
                    <button class="choice-btn" onclick="selectSize('2 Waffles', 8.00, this)">2 Pack (£8)</button>
                    <button class="choice-btn" onclick="selectSize('5 Waffles', 17.50, this)">Family (£17.50)</button>
                </div>
                <button class="btn" id="next2" disabled onclick="nextStep(3)" style="width: 100%;">Next Step</button>
            </div>

            <div class="step" id="step3">
                <h3>2. Pick a Topping</h3>
                <div class="option-grid">
                    <button class="choice-btn" onclick="selectTopping('Oreo', this)">Oreo</button>
                    <button class="choice-btn" onclick="selectTopping('Kinder', this)">Kinder</button>
                    <button class="choice-btn" onclick="selectTopping('Biscoff', this)">Biscoff</button>
                    <button class="choice-btn" onclick="selectTopping('Marshmallows', this)">Marshmallows</button>
                </div>
                <button class="btn" onclick="nextStep(4)" style="width: 100%;">Finalize Order</button>
            </div>

            <div class="step" id="step4">
                <h3>Final Check</h3>
                <div class="summary-box" id="orderSummary"></div>
                <input type="text" id="userName" placeholder="Enter Your Name">
                <button class="btn" onclick="sendWhatsApp()" style="width: 100%; background: #25D366; border: none;">Order via WhatsApp 📱</button>
            </div>
        </div>

        <footer style="margin-top: 30px; font-size: 0.9em; color: #8B4513;">
            📍 Collection Only | 💵 Cash Only
        </footer>
    </div>

    <script>
        let selection = { size: '', price: 0, topping: '' };

        function nextStep(n) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + n).classList.add('active');
            if(n === 4) updateSummary();
        }

        function selectSize(name, price, btn) {
            selection.size = name; selection.price = price;
            highlight(btn, '#step2');
            document.getElementById('next2').disabled = false;
        }

        function selectTopping(name, btn) {
            selection.topping = name;
            highlight(btn, '#step3');
        }

        function highlight(btn, stepId) {
            document.querySelectorAll(stepId + ' .choice-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        function updateSummary() {
            document.getElementById('orderSummary').innerHTML = `
                <p><strong>Size:</strong> ${selection.size}</p>
                <p><strong>Topping:</strong> ${selection.topping}</p>
                <p><strong>Total:</strong> £${selection.price.toFixed(2)}</p>
            `;
        }

        function sendWhatsApp() {
            const name = document.getElementById('userName').value;
            if(!name) return alert("Please enter your name!");
            const text = `WaffleLab Order:%0A- Name: ${name}%0A- Size: ${selection.size}%0A- Topping: ${selection.topping}%0A- Total: £${selection.price.toFixed(2)}`;
            window.open(`https://wa.me/447364135785?text=${text}`, '_blank');
        }
    </script>
</body>
</html>
